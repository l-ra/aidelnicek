name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for LLM worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-llm-worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push LLM worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./llm_worker
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-helm:
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update Chart versions
        run: |
          sed -i "s/version: .*/version: ${{ steps.version.outputs.VERSION }}/" helm/aidelnicek/Chart.yaml
          sed -i "s/appVersion: .*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" helm/aidelnicek/Chart.yaml

      - name: Log in to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR
        run: |
          helm chart save helm/aidelnicek ${{ env.REGISTRY }}/${{ github.repository_owner }}/aidelnicek-chart:${{ steps.version.outputs.VERSION }}
          helm chart push ${{ env.REGISTRY }}/${{ github.repository_owner }}/aidelnicek-chart:${{ steps.version.outputs.VERSION }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push-helm
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Log in to GHCR for Helm
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Create OpenAI LLM secret
        run: |
          kubectl create secret generic aidelnicek-llm \
            --from-literal=OPENAI_AUTH_BEARER="${{ secrets.OPENAI_AUTH_BEARER }}" \
            --from-literal=OPENAI_MODEL="${{ secrets.OPENAI_MODEL || 'gpt-4o' }}" \
            --from-literal=OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}" \
            --from-literal=LLM_PROVIDER="openai" \
            --from-literal=AI_REGEN_UI_ENABLED="${{ secrets.AI_REGEN_UI_ENABLED || 'false' }}" \
            --namespace=${{ secrets.K8S_PRODUCTION_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Production
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          helm upgrade --install aidelnicek oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/aidelnicek-chart \
            --version $VERSION \
            --namespace ${{ secrets.K8S_PRODUCTION_NAMESPACE }} \
            --set image.repository=${{ env.REGISTRY }}/${{ github.repository }} \
            --set image.tag=$VERSION \
            --set llmWorker.image.repository=${{ env.REGISTRY }}/${{ github.repository }}-llm-worker \
            --set llmWorker.image.tag=$VERSION \
            --set ingress.enabled=true \
            --set ingress.className=${{ secrets.K8S_INGRESS_CLASS }} \
            --set "ingress.hosts[0].host=${{ secrets.K8S_PRODUCTION_HOST }}" \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --set "ingress.annotations.cert-manager\.io/cluster-issuer=${{ secrets.K8S_CERT_ISSUER }}" \
            --set "ingress.tls[0].hosts[0]=${{ secrets.K8S_PRODUCTION_HOST }}" \
            --set ingress.tls[0].secretName=aidelnicek-production-tls \
            --set persistence.storageClass=${{ secrets.K8S_STORAGE_CLASS }} \
            --wait
