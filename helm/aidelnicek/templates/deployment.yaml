apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aidelnicek.fullname" . }}
  labels:
    {{- include "aidelnicek.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aidelnicek.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "aidelnicek.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "aidelnicek.fullname" . }}-llm
                optional: true
            - secretRef:
                name: {{ include "aidelnicek.fullname" . }}-mailer
                optional: true
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/www/html/data

        - name: llm-projector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["php", "/var/www/html/bin/generation-projector.php"]
          envFrom:
            - secretRef:
                name: {{ include "aidelnicek.fullname" . }}-llm
                optional: true
          resources:
            {{- toYaml .Values.projector.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/www/html/data

        - name: llm-worker
          image: "{{ .Values.llmWorker.image.repository }}:{{ .Values.llmWorker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.llmWorker.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "aidelnicek.fullname" . }}-llm
                optional: true
          env:
            - name: DATA_ROOT
              value: /data
            - name: DB_PATH
              value: /data/aidelnicek.sqlite
          ports:
            - name: llm-worker
              containerPort: 8001
              protocol: TCP
          resources:
            {{- toYaml .Values.llmWorker.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "aidelnicek.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
