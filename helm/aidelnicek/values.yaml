replicaCount: 1

image:
  repository: ghcr.io/l-ra/aidelnicek
  pullPolicy: IfNotPresent
  tag: ""

# Maximální počet výstupních tokenů na jedno volání LLM (PHP + llm-worker v podu).
# Lze přepsat také v Kubernetes Secretu aidelnicek-llm (envFrom má přednost).
llm:
  maxCompletionTokens: 16000

llmWorker:
  image:
    repository: ghcr.io/l-ra/aidelnicek-llm-worker
    pullPolicy: IfNotPresent
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

projector:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false

podAnnotations: {}

podSecurityContext:
  fsGroup: 33  # www-data group - ensures SQLite can write to /var/www/html/data

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: aidelnicek.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
